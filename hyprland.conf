# ═══════════════════════════════════════════════════════════════════════════════
# HYPRLAND.CONF - Configurazione Principale di Hyprland
# ═══════════════════════════════════════════════════════════════════════════════
#
# Tema: Terminal Hacker (Dark Minimal)
# Colori: Nero profondo + Verde terminale (#00ff41)
# Stile: Essenziale, minimale, perfetto per terminal lover
#
# Questa è la configurazione principale che include tutti gli altri file.
# Hyprland legge questo file all'avvio e carica le configurazioni collegate.
#
# Documentazione ufficiale: https://wiki.hypr.land/
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
# INCLUDE DELLE CONFIGURAZIONI
# ───────────────────────────────────────────────────────────────────────────────
# La configurazione è divisa in file separati per essere più organizzata.
# Ogni file ha uno scopo specifico ed è completamente commentato in italiano.
# I percorsi relativi funzionano perché Hyprland cerca i file nella stessa directory.

source = monitors.conf                     # Configurazione monitor (risoluzione, posizione)
source = variables.conf                    # Variabili e programmi (terminal, browser, etc.)
source = autostart.conf                    # Programmi che partono all'avvio
source = look.conf                         # Aspetto e stile (tema Terminal dark)
source = keybindings.conf                  # Scorciatoie da tastiera
source = permissions.conf                  # Permessi e sicurezza
source = windows.conf                      # Regole per finestre e workspace

# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1

# ───────────────────────────────────────────────────────────────────────────────
# COMANDI UTILI
# ───────────────────────────────────────────────────────────────────────────────

# Ricaricare la configurazione senza riavviare Hyprland:
#   SUPER + SHIFT + C  (se hai bindato questo comando)
#   Oppure: hyprctl reload

# Vedere lo stato attuale di Hyprland:
#   hyprctl summary

# Vedere i monitor rilevati:
#   hyprctl monitors

# Vedere le finestre aperte:
#   hyprctl clients

# Vedere i workspace:
#   hyprctl workspaces

# Vedere i log in tempo reale:
#   hyprctl hyprpaper reload (per wallpaper)
#   journalctl -f --user | grep hypr

# ───────────────────────────────────────────────────────────────────────────────
# STRUTTURA DEI FILE DI CONFIGURAZIONE
# ───────────────────────────────────────────────────────────────────────────────
#
# ┌────────────────────────────────────────────────────────────────────────────┐
# │ hyprland.conf        ← Questo file, include tutti gli altri               │
# │ ├── monitors.conf    ← Monitor: risoluzione, posizione, scaling           │
# │ ├── variables.conf   ← Variabili: programmi, environment variables        │
# │ ├── autostart.conf   ← Servizi e app che partono all'avvio                │
# │ ├── look.conf        ← Tema: colori, bordi, animazioni, trasparenze       │
# │ ├── keybindings.conf ← Scorciatoie: tasti per controllare Hyprland        │
# │ ├── permissions.conf ← Permessi: screenshot, plugin, input                │
# │ └── windows.conf     ← Regole: comportamento finestre e workspace         │
# └────────────────────────────────────────────────────────────────────────────┘
#