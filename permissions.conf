# ═══════════════════════════════════════════════════════════════════════════════
# PERMISSIONS.CONF - Permessi e sicurezza per Hyprland
# ═══════════════════════════════════════════════════════════════════════════════
# Questo file gestisce i permessi per funzionalità sensibili come:
# - Screenshot/screen recording (screencopy)
# - Plugin di terze parti
# - Accesso a dispositivi di input
#
# IMPORTANTE: Le modifiche qui richiedono un riavvio completo di Hyprland
# (non basta hyprctl reload) per motivi di sicurezza.
#
# Documentazione: https://wiki.hypr.land/Configuring/Permissions/
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
# ECOSYSTEM PERMISSIONS
# ───────────────────────────────────────────────────────────────────────────────
# Abilita il sistema di permessi globale di Hyprland.

# ecosystem {
#     # Abilita l'enforcement dei permessi
#     # 1 = i permessi sono controllati e applicati
#     # 0 = nessun controllo (sconsigliato)
#     enforce_permissions = 1
# }

# ───────────────────────────────────────────────────────────────────────────────
# PERMESSI SCREENCOPY (SCREENSHOT/SCREEN RECORDING)
# ───────────────────────────────────────────────────────────────────────────────
# Permetti a programmi specifici di fare screenshot o registrare lo schermo.
# Questo è necessario per: grim, slurp, obs-studio, kooha, etc.

# permission = /usr/bin/grim, screencopy, allow
# permission = /usr/bin/slurp, screencopy, allow
# permission = /usr/bin/obs, screencopy, allow
# permission = /usr/bin/kooha, screencopy, allow

# Per xdg-desktop-portal-hyprland (necessario per screen sharing browser/app)
# permission = /usr/lib/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/libexec/xdg-desktop-portal-hyprland, screencopy, allow

# ───────────────────────────────────────────────────────────────────────────────
# PERMESSI PLUGIN
# ───────────────────────────────────────────────────────────────────────────────
# Hyprland supporta plugin di terze parti. Qui puoi specificare quali
# executable possono caricare plugin.

# permission = /usr/bin/hyprpm, plugin, allow
# permission = /usr/local/bin/hyprpm, plugin, allow

# ───────────────────────────────────────────────────────────────────────────────
# PERMESSI INPUT
# ───────────────────────────────────────────────────────────────────────────────
# Permetti a programmi di simulare input da tastiera/mouse.
# Utile per: ydotool, wtype, wvkbd, etc.

# permission = /usr/bin/ydotool, input, allow
# permission = /usr/bin/wtype, input, allow
# permission = /usr/bin/wvkbd, input, allow

# ───────────────────────────────────────────────────────────────────────────────
# PERMESSI INVERSE (NEGARE PERMESSI)
# ───────────────────────────────────────────────────────────────────────────────
# Puoi anche negare esplicitamente permessi a programmi specifici.

# permission = /usr/bin/some-untrusted-app, screencopy, deny
# permission = /usr/bin/some-untrusted-app, input, deny

# ───────────────────────────────────────────────────────────────────────────────
# NOTE IMPORTANTI
# ───────────────────────────────────────────────────────────────────────────────
# 1. I percorsi devono essere ABSOLUTI e corretti.
#    Usa 'which <programma>' per trovare il percorso esatto.
#
# 2. Alcuni programmi potrebbero avere percorsi diversi:
#    - /usr/bin/
#    - /usr/local/bin/
#    - /usr/lib/
#    - /usr/libexec/
#
# 3. Dopo aver modificato questo file, DEVI riavviare completamente Hyprland:
#    - Esci dalla sessione (logout)
#    - Rientra (login)
#    Oppure:
#    - Riavvia il sistema
#
# 4. Per verificare i permessi attuali:
#    hyprctl permissions
#
# 5. Se un programma non funziona correttamente (es. screenshot fallisce),
#    controlla i log di Hyprland per errori di permessi.

# ───────────────────────────────────────────────────────────────────────────────
# CONFIGURAZIONE CONSIGLIATA PER SETUP MINIMAL
# ───────────────────────────────────────────────────────────────────────────────
# Per un setup minimal hacker, probabilmente ti servono solo:
# - grim/slurp per screenshot
# - xdg-desktop-portal per screen sharing occasionale

# ecosystem {
#     enforce_permissions = 1
# }

# permission = /usr/bin/grim, screencopy, allow
# permission = /usr/bin/slurp, screencopy, allow
# permission = /usr/lib/xdg-desktop-portal-hyprland, screencopy, allow
