conky.config = {

    -- window position and size
    alignment = 'top_right',
    gap_x = 20,
    gap_y = 60,
    out_to_wayland = true,
    -- layer = 'background',
    minimum_height = 560,
    minimum_width = 200,
    maximum_width = 300,
    background = false,
    border_width = 0,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'desktop',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    -- Colors - Terminal Hacker Theme (matching Hyprland)
    font = 'RobotoMono Nerd Font:size=8',
    font1 = 'RobotoMono Nerd Font:size=8',
    color1 = '#c0c0c0',                        -- testo principale (white-ish)
    color2 = '#808080',                        -- testo secondario (dimmed)
    color3 = '#00ff41',                        -- verde terminale (accent)
    color4 = '#003300',                        -- verde scuro (sfondo/ombre)
    color5 = '#00ff41',                        -- verde terminale (upload)
    color6 = '#00ff41',                        -- verde terminale (titoli)
    color7 = '#606060',                        -- grigio scuro
    color8 = '#00ff41',                        -- verde terminale (highlights)

    own_window_transparent = false,            -- transparency
    own_window_argb_visual = true,             -- transparency
    own_window_argb_value = 0,                 -- transparency [0 -255]
    default_color = '#c0c0c0',                 -- default colors
    default_outline_color = '#00ff41',         -- outline verde terminale
    default_shade_color = '#003300',           -- shade verde scuro
    double_buffer = true,                      -- removes flickering
    draw_borders = false,                      -- borders (window)
    draw_graph_borders = true,                 -- borders (graphs)
    draw_outline = false,                      -- border (text)
    draw_shades = false,                       -- shades
    extra_newline = false,                     -- extra newline at the end when writing to stdout

    -- other
    update_interval = 2.0,
    cpu_avg_samples = 4,
    net_avg_samples = 4,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = true,
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
}

conky.text = [[
${goto 9}
${goto 9}${color3}                        -`
${goto 9}${color3}                       .o+`
${goto 9}${color3}                      `ooo/
${goto 9}${color3}                     `+oooo:
${goto 9}${color3}                    `+oooooo:
${goto 9}${color3}                    -+oooooo+:
${goto 9}${color3}                  `/:-:++oooo+:
${goto 9}${color3}                `/++++++++++++++:
${goto 9}${color3}               `/+++ooooooooooooo/`
${goto 9}${color3}             .oossssso-````/ossssss+`
${goto 9}${color3}            -osssssso.      :ssssssso.
${goto 9}${color3}           :osssssss/        osssso+++.
${goto 9}${color3}          /ossssssss/        +ssssooo/-
${goto 9}${color3}        `/ossssso+/:-        -:/+osssso+-
${goto 9}${color3}       `+sso+:-`                 `.-/+oso:
${goto 9}${color3}      `++:.                           `-/+/
${goto 9}${color3}      .`                                 `/

${goto 9}${color2}______________________________________________

${goto 9}${color1}${font1} SYSTEM ${voffset 8}${font1}
${goto 9}${color3}󰣇 ${color1}OS:        ${color2}$sysname $nodename $machine
${goto 9}${color3}󰌽 ${color1}Kernel:    ${color2}$kernel
${goto 9}${color3}󰅐 ${color1}Uptime:    ${color2}$uptime
${goto 9}${color3}󰃵 ${color1}Installed: ${color2}2024-01-02
${goto 9}${color2}______________________________________________

${goto 9}${color1}󰋊 FILESYSTEM ${voffset 8}${font}
${goto 9}${color3} ${color1}root:  ${color2}${fs_used /}/${fs_size /}${alignr}${fs_used_perc /}% ${color1}${fs_bar 6, 124 /}
${goto 9}${color2}_______________________________________________

${goto 9}${color1} TOP PROCESSES ${font1}  ${alignr}${color1}󰻠 CPU(${cpu}%%)${font}${voffset 8}
${goto 9}${color3}󰍛 ${color1}MEM: ${top_mem name 1}${color2}${top_mem mem 1}   ${color3}󰻠 ${color1}CPU: ${top name 1}${color2}${top cpu 1}
${goto 9}${color3}󰁔 ${color1}    ${top_mem name 2}${color2}${top_mem mem 2}   ${color3}󰁔 ${color1}    ${top name 2}${color2}${top cpu 2}
${goto 9}${color3}󰁔 ${color1}    ${top_mem name 3}${color2}${top_mem mem 3}   ${color3}󰁔 ${color1}    ${top name 3}${color2}${top cpu 3}${voffset 8}
${goto 9}${color3}󰍛 ${color1}RAM:  ${color2}$mem/$memmax ${alignr} $memperc% ${color1}${membar 4, 124}
${goto 9}${color3}󰾵 ${color1}Swap: ${color2}$swap/$swapmax ${alignr} $swapperc% ${color1}${swapbar 4, 124}
${goto 9}${color3}󰻠 ${color1}CPU:  ${color2}${freq_g}GHz ${alignr} ${cpu}% ${color1}${cpubar 4, 124}
${goto 9}${color2}_______________________________________________

${if_existing /sys/class/net/eno1}\
${goto 9}${color1}󰈀 ETHERNET (eno1) ${voffset 8}${font}
${goto 9}${color3}IP: ${color2}${addr eno1}${goto 161}${color3}PUB: ${color2}${execi 3600 curl -s https://ipinfo.io/ip}
${goto 9}${color3}󰕒 ${color1}Total Up: ${color2}${totalup eno1}${goto 161}${color3}󰇚 ${color1}Total Down: ${color2}${totaldown eno1}
${goto 9}${color3}󰕒 ${color1}Speed Up: ${color5}${upspeed eno1}${goto 161}${color3}󰇚 ${color1}Speed Down: ${color3}${downspeed eno1}
${goto 9}${color5}${upspeedgraph eno1 15, 130 003300 00ff41}${goto 161}${color5}${downspeedgraph eno1 15, 130 003300 00ff41}
${goto 9}${color2}______________________________________________
${endif}\
${if_existing /sys/class/net/wlan0}\
${goto 9}${color1}󰤨 WIRELESS (wlan0) ${voffset 8}${font}
${goto 9}${color3}IP: ${color2}${addr wlan0}${goto 161}${color3}PUB: ${color2}${execi 3600 curl -s https://ipinfo.io/ip}
${goto 9}${color3}󰕒 ${color1}Total Up: ${color2}${totalup wlan0}${goto 161}${color3}󰇚 ${color1}Total Down: ${color2}${totaldown wlan0}
${goto 9}${color3}󰕒 ${color1}Speed Up: ${color5}${upspeed wlan0}${goto 161}${color3}󰇚 ${color1}Speed Down: ${color3}${downspeed wlan0}
${goto 9}${color5}${upspeedgraph wlan0 15, 130 003300 00ff41}${goto 161}${color5}${downspeedgraph wlan0 15, 130 003300 00ff41}
${goto 9}${color2}______________________________________________
${endif}\
${if_existing /sys/class/net/tun0}\
${goto 9}${color1}󰖂 VPN (tun0) ${voffset 8}${font}
${goto 9}${color3}IP: ${color2}${addr tun0}
${goto 9}${color3}󰕒 ${color1}Total Up: ${color2}${totalup tun0}${goto 161}${color3}󰇚 ${color1}Total Down: ${color2}${totaldown tun0}
${goto 9}${color3}󰕒 ${color1}Speed Up: ${color5}${upspeed tun0}${goto 161}${color3}󰇚 ${color1}Speed Down: ${color3}${downspeed tun0}
${goto 9}${color5}${upspeedgraph tun0 15, 130 003300 00ff41}${goto 161}${color5}${downspeedgraph tun0 15, 130 003300 00ff41}
${goto 9}${color2}______________________________________________
${endif}\

${goto 9}${color1}󰿘 NETWORK INFO ${voffset 8}${font}
${goto 9}${color3}󰇖 ${color7}DNS Server${goto 161}${color3}󰤁 ${color7}Gateway
${goto 9}${color3}󰇖 ${color1}${execi 99999 cat /etc/resolv.conf | grep "nameserver" | awk '{ print $2 }' | head -n 1}${goto 161}${color3}󰤁 ${color1}${execi 99999 ip r | grep default | awk 'NR==1{ print $3 }'}  ${offset 9}
]]
