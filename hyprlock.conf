# ═══════════════════════════════════════════════════════════════════════════════
# HYPRLOCK.CONF - Tema Minimalista Verde/Nero (Stile Greetd)
# ═══════════════════════════════════════════════════════════════════════════════

general {
    disable_splash = true
    immediate_render = true
}

# Sfondo nero solido, senza wallpaper o blur
background {
    monitor =
    color = rgb(0, 0, 0)
}

# Input Password: Semplice, rettangolare, verde su nero
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.5
    dots_center = true
    outer_color = rgb(0, 255, 65)
    inner_color = rgb(0, 0, 0)
    font_color = rgb(0, 255, 65)
    fade_on_empty = false
    placeholder_text = <span foreground="##00ff41">password for $USER...</span>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
    rounding = 0 # Angoli vivi
    
    # Rimosso il giallo fastidioso del Caps Lock
    caps_lock_color = rgb(0, 255, 65)
    num_lock_color = rgb(0, 255, 65)
    both_lock_color = rgb(0, 255, 65)
    
    check_color = rgb(0, 255, 65)
    fail_color = rgb(255, 0, 0)
}

# Orologio minimale
label {
    monitor =
    text = $TIME
    color = rgb(0, 255, 65)
    font_size = 48
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

# Data minimale
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %d %B')"
    color = rgb(0, 255, 65)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}
