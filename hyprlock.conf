# ═══════════════════════════════════════════════════════════════════════════════
# HYPRLLOCK.CONF - Lock screen tema Terminal Hacker
# ═══════════════════════════════════════════════════════════════════════════════
# Tema: Terminal / Hacker - Nero profondo con verde terminale (#00ff41)
# ═══════════════════════════════════════════════════════════════════════════════

general {
    # Disabilita splash screen iniziale
    disable_splash = true

    # Colore di sfondo immediato (prima che carichi il wallpaper)
    immediate_render = true

    # Font default per tutto il lock screen
    font_family = JetBrainsMono Nerd Font
}

# ───────────────────────────────────────────────────────────────────────────────
# SFONDO
# ───────────────────────────────────────────────────────────────────────────────
background {
    # Percorso wallpaper (lo stesso di hyprpaper)
    path = /home/sec/.config/hypr/wallpaper/wallpaper.jpg

    # Effetto blur sullo sfondo (per leggibilità)
    blur_passes = 3
    blur_size = 6

    # Contrasto e luminosità
    contrast = 1.0
    brightness = 0.8

    # Colore di fallback se il wallpaper non carica
    color = #0a0a0a
}

# ───────────────────────────────────────────────────────────────────────────────
# ORologio E DATA
# ───────────────────────────────────────────────────────────────────────────────
label {
    # Posizione: center = centrato, o coordinate assolute
    position = 0, -150
    center = true

    # Formato data/ora
    text = cmd[update:1000] echo "<span>$(date '+%H:%M:%S')</span>"
    text_font = JetBrainsMono Nerd Font
    font_size = 80
    font_color = #00ff41

    # Effetto glow/neon
    text_shadow = 0 0 10px #00ff41

    # Rotazione (0 = normale)
    rotate = 0
}

label {
    # Data sotto l'orologio
    position = 0, -80
    center = true

    text = cmd[update:1000] echo "<span>$(date '+%A, %d %B %Y')</span>"
    text_font = JetBrainsMono Nerd Font
    font_size = 20
    font_color = #00ff41

    text_shadow = 0 0 5px #00ff41
}

# ───────────────────────────────────────────────────────────────────────────────
# INPUT PASSWORD
# ───────────────────────────────────────────────────────────────────────────────
input-field {
    # Posizione
    position = 0, 0
    center = true

    # Dimensioni
    size = 300, 50

    # Stile bordo
    border_size = 2
    border_color = #00ff41

    # Angoli arrotondati (0 = angoli vivi, hacker style)
    rounding = 10

    # Colori
    color = rgba(10, 10, 10, 0.9)
    inner_color = #001100
    outer_color = #00ff41

    # Testo placeholder
    placeholder_text = <span foreground="#00ff41">Password...</span>
    
    # Effetti
    fade_on_empty = true
    fade_timeout = 1000

    # Trasparenza quando vuoto
    check_color = #00ff41
    fail_color = #ff3333
    fail_text = <span foreground="#ff3333">Errato!</span>

    # CapsLock indicator
    caps_lock_color = #ffff00
}

# ───────────────────────────────────────────────────────────────────────────────
# MESSAGGIO UTENTE
# ───────────────────────────────────────────────────────────────────────────────
label {
    # Nome utente o messaggio sopra l'input
    position = 0, 50
    center = true

    text = $USER
    text_font = JetBrainsMono Nerd Font
    font_size = 16
    font_color = #00ff41

    text_shadow = 0 0 5px #00ff41
}

# ───────────────────────────────────────────────────────────────────────────────
# INDICATORE CAPS LOCK
# ───────────────────────────────────────────────────────────────────────────────
label {
    position = 0, 60
    center = true

    # Mostra stato CapsLock
    text =  Caps Lock
    text_font = JetBrainsMono Nerd Font
    font_size = 14
    font_color = #ffff00

    # Nascondi quando non attivo
    hide_if_text_empty = false
}

# ───────────────────────────────────────────────────────────────────────────────
# EFFETTI EXTRA
# ───────────────────────────────────────────────────────────────────────────────

# Gradiente verde sottile ai bordi
shape {
    position = 0, 0
    center = true
    
    size = 400, 2
    color = #00ff41
    rounding = 0
}
