# ═══════════════════════════════════════════════════════════════════════════════
# MONITORS.CONF - Configurazione Monitor
# ═══════════════════════════════════════════════════════════════════════════════
# Qui si configurano i monitor collegati al sistema.
# Hyprland può gestire setup multi-monitor complessi.
#
# Documentazione: https://wiki.hypr.land/Configuring/Monitors/
#
# Formato base:
#   monitor=<nome>,<risoluzione>@<refresh>,<posizione>,<scale>
#
# Esempi:
#   monitor=HDMI-A-1,1920x1080@60,0x0,1
#   monitor=DP-1,2560x1440@144,1920x0,1
#   monitor=eDP-1,1920x1080@60,auto,auto
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
# CONFIGURAZIONE AUTOMATICA (DEFAULT)
# ───────────────────────────────────────────────────────────────────────────────
# Questa configurazione usa le impostazioni preferite dal monitor.
# Hyprland rileva automaticamente risoluzione e refresh rate ottimali.
#
# "preferred" = usa la risoluzione preferita del monitor
# "auto" = posizione automatica (per single monitor)
# "auto" = scaling automatico (1 = nessun scaling)

#monitor = , preferred, auto, auto
monitor = DP-5, 1920x1080@60, -1920x0,1
monitor = DP-6, 1920x1080@60, 0x0,1
monitor = eDP-1, 1920x1200@60, 1920x0,1

# ───────────────────────────────────────────────────────────────────────────────
# CONFIGURAZIONI ESEMPIO PER SETUP COMUNI
# ───────────────────────────────────────────────────────────────────────────────
# Decommenta e modifica una di queste configurazioni in base al tuo setup.
# Per trovare i nomi dei tuoi monitor, usa: hyprctl monitors

# ─── SINGOLO MONITOR LAPTOP ──────────────────────────────────────────────────
# Per laptop con schermo integrato (eDP-1 è comune)
# monitor = eDP-1, 1920x1080@60, 0x0, 1

# ─── DUAL MONITOR (LAPTOP + ESTERNO) ─────────────────────────────────────────
# Monitor laptop a sinistra, monitor esterno a destra
# monitor = eDP-1, 1920x1080@60, 0x0, 1
# monitor = HDMI-A-1, 2560x1440@144, 1920x0, 1

# ─── MONITOR ESTERNO SINGOLO ─────────────────────────────────────────────────
# Se usi solo il monitor esterno e vuoi disabilitare quello del laptop
# monitor = HDMI-A-1, 2560x1440@144, 0x0, 1
# monitor = eDP-1, disable

# ─── TRIPLA CONFIGURAZIONE ───────────────────────────────────────────────────
# Tre monitor allineati orizzontalmente
# monitor = DP-1, 2560x1440@144, 0x0, 1
# monitor = HDMI-A-1, 2560x1440@144, 2560x0, 1
# monitor = DP-2, 1920x1080@60, 5120x0, 1

# ─── MONITOR VERTICALE ───────────────────────────────────────────────────────
# Un monitor ruotato di 90 gradi (per coding/lettura)
# monitor = DP-1, 2560x1440@144, 0x0, 1, transform, 1
# (transform: 0=normal, 1=90°, 2=180°, 3=270°)

# ───────────────────────────────────────────────────────────────────────────────
# OPZIONI AVANZATE
# ───────────────────────────────────────────────────────────────────────────────

# ─── VRR / G-SYNC / FREESYNC ─────────────────────────────────────────────────
# Abilita Variable Refresh Rate per monitor che lo supportano
# Utile per gaming, riduce tearing e stuttering
# monitor = HDMI-A-1, highrr, 0x0, 1, vrr, 1

# ─── DISABLED MONITOR ────────────────────────────────────────────────────────
# Disabilita un monitor specifico (utile per laptop con coperchio chiuso)
# monitor = eDP-1, disable

# ─── POSITIONING ─────────────────────────────────────────────────────────────
# Posiziona i monitor con coordinate precise
# Formato: xpos,ypos (angolo in alto a sinistra del monitor)
# monitor = HDMI-A-1, 2560x1440@144, 1920x0, 1
# (Questo monitor inizia a x=1920, quindi è a destra di un monitor 1920x1080)

# ─── SCALING ─────────────────────────────────────────────────────────────────
# Scaling per monitor HiDPI/4K
# 1 = 100% (nessuno scaling)
# 1.25 = 125%
# 1.5 = 150%
# 2 = 200% (HiDPI)
# monitor = DP-1, 3840x2160@60, 0x0, 2

# ───────────────────────────────────────────────────────────────────────────────
# COMANDI UTILI PER MONITOR
# ───────────────────────────────────────────────────────────────────────────────

# Per vedere i monitor disponibili e le loro impostazioni:
#   hyprctl monitors

# Per vedere tutte le modalità disponibili per un monitor:
#   hyprctl monitors all

# Per cambiare risoluzione dinamicamente (senza riavviare):
#   hyprctl keyword monitor "HDMI-A-1, 2560x1440@144, 0x0, 1"

# ───────────────────────────────────────────────────────────────────────────────
# NOTE IMPORTANTI
# ───────────────────────────────────────────────────────────────────────────────
# 1. I nomi dei monitor (HDMI-A-1, DP-1, eDP-1) variano da sistema a sistema.
#    Usa 'hyprctl monitors' per trovare i nomi corretti.
#
# 2. Se un monitor non si accende, prova a specificare refresh rate esplicito.
#    Esempio: 1920x1080@60 invece di preferred
#
# 3. Per setup complessi, configura prima con hyprctl e poi salva la config.
#
# 4. Il parametro "auto" per la posizione funziona solo con monitor singolo.
#    Con multi-monitor, devi specificare coordinate esplicite.
