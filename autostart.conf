# ═══════════════════════════════════════════════════════════════════════════════
# AUTOSTART.CONF - Programmi che partono all'avvio di Hyprland
# ═══════════════════════════════════════════════════════════════════════════════
# Qui si configurano i programmi e servizi che devono partire automaticamente
# quando Hyprland si avvia. Utile per: barre di stato, wallpaper, notifiche, etc.
#
# Formato:
#   exec-once = comando
#
# Il comando viene eseguito una sola volta all'avvio della sessione.
# Per comandi che devono rimanere in background, usa & alla fine.
#
# Documentazione: https://wiki.hypr.land/Configuring/Keywords/#exec-once
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
# SERVIZI ESSENZIALI
# ───────────────────────────────────────────────────────────────────────────────

# ─── AMBIENTE E PORTALI ──────────────────────────────────────────────────────
# Importante per far funzionare nm-applet, screenshot e condivisione schermo
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/xdg-desktop-portal-hyprland &
exec-once = /usr/lib/xdg-desktop-portal &

# ─── GNOME KEYRING (PASSWORD BROWSER) ─────────────────────────────────────────
# Avvia il gestore password per Chrome/Brave
exec-once = gnome-keyring-daemon --start --components=secrets

# ─── POLKIT AGENT ────────────────────────────────────────────────────────────
# Necessario per autorizzazioni amministrative (sudo GUI, mount dischi, etc.)
# Nota: Su Arch l'agente KDE è in /usr/lib/polkit-kde-authentication-agent-1
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# ─── WALLPAPER ───────────────────────────────────────────────────────────────
# Gestore wallpaper per Hyprland
exec-once = swaybg -i ~/.config/hypr/wallpaper/walp3.jpg -m fill
#exec-once = phonto ~/Videos/walp3.mp4 --shader ~/.config/phonto/darken.glsl

# ─── BARRE DI STATO ─────────────────────────────────────────────────────────
# Barra in alto/basso con clock, workspace, sistema, etc.
#exec-once = waybar -c $HOME/.config/hypr/waybar/config -s $HOME/.config/hypr/waybar/style.css
exec-once = env QT_ICON_THEME=Papirus-Dark quickshell --path $HOME/.config/hypr/quickshell/shell.qml
# ─── NETWORK MANAGER ────────────────────────────────────────────────────────
# Applet per gestione rete WiFi/Ethernet
exec-once = nm-applet --indicator

# ─── BLUETOOTH ───────────────────────────────────────────────────────────────
# Applet Bluetooth
exec-once = blueman-applet

# ─── VOLUME (AUDIO) ─────────────────────────────────────────────────────────
# Applet volume per la tray
exec-once = pasystray

#clipboard manager
exec-once = copyq --start-server

# ─── Screenshot ─────────────────────────────────────────────────────────────
# Applet flameshot per screenshot per la tray
#exec-once = flameshot &

# ─── NOTIFICHE (SWAYNC) ──────────────────────────────────────────────────────
# Notification Center moderno con pannello laterale
exec-once = swaync -c $HOME/.config/hypr/swaync/config.json -s $HOME/.config/hypr/swaync/style.css
exec-once = sleep 2 && swaync-client --dnd-off


# ─── GESTIONE ENERGIA (HYPRIDLE) ───────────────────────────────────────────
# Gestisce lo spegnimento monitor e il lock della sessione
exec-once = hypridle -c $HOME/.config/hypr/hypridle.conf

# CONKY (Disabilitato per risparmio batteria, decommenta se necessario)
exec-once = conky -c $HOME/.config/hypr/conky/cyberconky.conf &

# MOUSE
exec-once = hyprctl setcursor Breeze_Dark_Lime 24