# ═══════════════════════════════════════════════════════════════════════════════
# VARIABLES.CONF - Variabili e programmi per Hyprland
# ═══════════════════════════════════════════════════════════════════════════════
# Questo file contiene le variabili per i programmi principali e le variabili
# d'ambiente necessarie per il corretto funzionamento di Hyprland e delle app.
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
# PROGRAMMI PRINCIPALI
# ───────────────────────────────────────────────────────────────────────────────
# Definisci qui i programmi che userai più spesso. Modificandoli qui,
# si aggiorneranno automaticamente tutti i keybindings che li usano.

#$terminal = kitty              # Terminale: kitty (veloce, moderno, supporta GPU)
$terminal = terminology
$fileManager = nemo         # File manager: dolphin (completo, stile KDE)
$menu = rofi -show drun -config ~/.config/hypr/rofi/config.rasi 2>/dev/null
$browser = brave             # Browser: firefox (puoi cambiare con chromium, brave, etc.)
$editor = subl                 # Editor: vscode (puoi cambiare con nvim, subl, etc.)


# ───────────────────────────────────────────────────────────────────────────────
# VARIABILI D'AMBIENTE
# ───────────────────────────────────────────────────────────────────────────────
# Le variabili d'ambiente configurano il comportamento di X11/Wayland
# e di varie applicazioni. Vedi: https://wiki.hypr.land/Configuring/Environment-variables/

# Dimensione del cursore del mouse (in pixel)
# Usato da applicazioni GTK/Qt per dimensionare correttamente il cursore
env = XCURSOR_SIZE, 24
env = XCURSOR_THEME,Breeze_Dark_Lime
# Dimensione del cursore per Hyprland nativamente
# Deve essere coerente con XCURSOR_SIZE per evitare cursori di dimensioni sbagliate
env = HYPRCURSOR_SIZE, 24
env = HYPRCURSOR_THEME,Breeze_Dark_Lime
# ───────────────────────────────────────────────────────────────────────────────
# FIX PER NVIDIA (CRITICO PER EVITARE SCHERMO NERO)
# ───────────────────────────────────────────────────────────────────────────────
# Decommenta queste righe se hai una scheda video NVIDIA!

# env = LIBVA_DRIVER_NAME,nvidia
# env = XDG_SESSION_TYPE,wayland
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = WLR_NO_HARDWARE_CURSORS,1

# ───────────────────────────────────────────────────────────────────────────────
# VARIABILI D'AMBIENTE CONSIGLIATE
# ───────────────────────────────────────────────────────────────────────────────

# Per applicazioni GTK ( GNOME, Firefox, etc.)
env = GTK_THEME, Adwaita-dark          # Tema scuro per app GTK
env = GTK_USE_PORTAL, 1                # Usa portal GTK per integrazione Wayland

# Per applicazioni Qt (KDE, Dolphin, etc.)
env = QT_QPA_PLATFORM,wayland;xcb      # Prova Wayland, poi X11 come fallback
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1  # Rimuove decorazioni finestre Qt
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1   # Auto-scaling per monitor HiDPI
env = QT_QPA_PLATFORMTHEME, qt5ct      # Usa qt5ct per i temi (o qt6ct)

# Per Electron app (Discord, VSCode, Spotify)
env = ELECTRON_OZONE_PLATFORM_HINT, auto  # Migliora supporto Wayland per Electron

# Per il clipboard manager
env = XDG_SESSION_TYPE, wayland        # Assicura che le app sappiano che sei su Wayland
