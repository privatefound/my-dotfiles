# ═══════════════════════════════════════════════════════════════════════════════
# KEYBINDINGS.CONF - Scorciatoie da tastiera per Hyprland
# ═══════════════════════════════════════════════════════════════════════════════
# Tutte le combinazioni di tasti per controllare Hyprland e le applicazioni.
# Stile minimal: solo i bind essenziali, niente di superfluo.
#
# Legenda:
#   $mainMod = Tasto SUPER (tasto Windows)
#   bind = <modificatore>, <tasto>, <azione>, [parametri]
#   bindl = bind per tasti multimediali (latch, non serve tenere premuto)
#   bindel = bind per tasti speciali (brightness, volume hardware)
#   bindm = bind per mouse (click + movimento)
#
# Documentazione: https://wiki.hypr.land/Configuring/Binds/
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
# VARIABILI PRINCIPALI
# ───────────────────────────────────────────────────────────────────────────────

$mainMod = SUPER    # Tasto "Windows" come modificatore principale

#Scorrimento rapido (Alt-Tab classico nativo)
bind = ALT, Tab, cyclenext,          # Prossima finestra
bind = ALT SHIFT, Tab, cyclenext, prev # Finestra precedente

# Visualizzazione grafica (SUPER-Tab con Wofi)
#bind = $mainMod, Tab, exec, wofi --show window --allow-images --style ~/.config/hypr/wofi_style.css --width 600 --height 400


# ═══════════════════════════════════════════════════════════════════════════════
# APPLICAZIONI PRINCIPALI
# ═══════════════════════════════════════════════════════════════════════════════

# Apri terminale (kitty)
# Il tuo pane quotidiano per il lavoro hacker
bind = $mainMod, T, exec, $terminal

# Apri file manager (dolphin)
# Per navigare nel filesystem graficamente
bind = $mainMod, E, exec, $fileManager

# Apri launcher applicazioni (rofi) con il tasto GRAVE (quello sopra il TAB)
# Nota: questo disabilita la scrittura del carattere `
bind = , grave, exec, $menu

# Apri browser web
# Per quando devi cercare su Google/StackOverflow
bind = $mainMod SHIFT, B, exec, $browser

# Apri editor di testo/codice (VSCode)
# Per programmare o modificare file
bind = $mainMod SHIFT, C, exec, $editor


# ═══════════════════════════════════════════════════════════════════════════════
# GESTIONE FINESTRE
# ═══════════════════════════════════════════════════════════════════════════════

# Chiudi finestra attiva
# Uccide la finestra corrente (equivalente a premere la X)
bind = $mainMod, K, killactive,

# Toggle floating/tiling per la finestra attiva
# Passa da finestra flottante a tiling e viceversa
bind = $mainMod, V, togglefloating,

# Toggle fullscreen per la finestra attiva
# Schermo intero (come F11 nei browser)
bind = $mainMod, F, fullscreen, 1

# Toggle fullscreen senza decorazioni (maximized)
# Occupa tutto lo schermo ma mantiene i bordi
bind = $mainMod SHIFT, F, fullscreen, 0


## DWINDLE TO MASTER keybind
bind = $mainMod, M, exec, hyprctl keyword general:layout "master"
bind = $mainMod, H, exec, hyprctl keyword general:layout "dwindle"


# Pseudo-tiling (solo layout dwindle)
# Mantiene aspect ratio ma permette resizing
#bind = $mainMod, P, pseudo,

# Cambia split direction (solo layout dwindle)
# Alterna tra split orizzontale e verticale
#bind = $mainMod, J, layoutmsg, togglesplit


# ═══════════════════════════════════════════════════════════════════════════════
# SPOSTAMENTO FOCUS TRA FINESTRE
# ═══════════════════════════════════════════════════════════════════════════════

# Sposta il focus con i tasti freccia
# Intuitivo: premi freccia per andare nella direzione della finestra
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Alternativa con HJKL (stile Vim)
# Per chi ama l'efficienza di Vim/Nvim
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d


# ═══════════════════════════════════════════════════════════════════════════════
# WORKSPACE (AREE DI LAVORO)
# ═══════════════════════════════════════════════════════════════════════════════
# 10 workspace disponibili, numerati da 1 a 10 (0 = 10)
# Organizza le tue app per contesto:
#   1: Terminale / Coding
#   2: Browser
#   3: File manager
#   4: Media / Musica
#   5-10: Liberi per altri usi

# ─── VAI AI WORKSPACE ────────────────────────────────────────────────────────
# Premi SUPER + [1-9, 0] per andare al workspace corrispondente
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ─── SPOSTA FINESTRA SU UN WORKSPACE ─────────────────────────────────────────
# Premi SUPER + SHIFT + [1-9, 0] per spostare la finestra attiva
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ─── WORKSPACE SPECIALE (SCRATCHPAD) ─────────────────────────────────────────
# Uno workspace "nascosto" che appare/scompare con un tasto
# Perfetto per: terminale temporaneo, calcolatrice, note rapide
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ─── SCORRI WORKSPACE CON SCROLL WHEEL ───────────────────────────────────────
# Usa la rotellina del mouse mentre tieni premuto SUPER
# Per scorrere avanti/indietro tra i workspace
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


# ═══════════════════════════════════════════════════════════════════════════════
# SPOSTAMENTO FINESTRE
# ═══════════════════════════════════════════════════════════════════════════════

# Sposta finestra nella direzione indicata
# Sposta fisicamente la finestra, non solo il focus
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

# Alternativa con HJKL (stile Vim)
bind = $mainMod CTRL, h, movewindow, l
bind = $mainMod CTRL, l, movewindow, r
bind = $mainMod CTRL, k, movewindow, u
bind = $mainMod CTRL, j, movewindow, d

# Sposta finestra al workspace successivo/precedente
# Utile per riorganizzare rapidamente
bind = $mainMod ALT, left, movetoworkspace, r-1
bind = $mainMod ALT, right, movetoworkspace, r+1


# ═══════════════════════════════════════════════════════════════════════════════
# CONTROLLO VOLUME E LUMINOSITÀ
# ═══════════════════════════════════════════════════════════════════════════════
# Questi usano bindel perché sono tasti speciali della tastiera
# Non serve tenere premuto SUPER, funzionano direttamente

# ─── VOLUME AUDIO ────────────────────────────────────────────────────────────
# Volume Su
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5

# Volume Giù
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5

# Muta audio (tasto XF86AudioMute)
bindel = , XF86AudioMute, exec, pamixer -t

# Muta microfono (tasto XF86AudioMicMute)
bindel = , XF86AudioMicMute, exec, pamixer --default-source -t

# ─── LUMINOSITÀ SCHERMO ──────────────────────────────────────────────────────
# Aumenta luminosità (tasto XF86MonBrightnessUp)
# -e4 = errore se valore > 4, -n2 = step di 2%
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+

# Abbassa luminosità (tasto XF86MonBrightnessDown)
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-


# ─── CONTROLLI MULTIMEDIALI ──────────────────────────────────────────────────
# Richiedono playerctl installato (per Spotify, VLC, browser, etc.)

# Traccia successiva
bindl = , XF86AudioNext, exec, playerctl next

# Play/Pausa
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause

# Traccia precedente
bindl = , XF86AudioPrev, exec, playerctl previous


# ═══════════════════════════════════════════════════════════════════════════════
# MOUSE E DRAGGING
# ═══════════════════════════════════════════════════════════════════════════════
# bindm = bind che attiva il movimento del mouse

# Sposta finestra con SUPER + Click SINISTRO + Trascina
# mouse:272 = bottone sinistro del mouse
bindm = $mainMod, mouse:272, movewindow

# Ridimensiona finestra con SUPER + Click DESTRO + Trascina
# mouse:273 = bottone destro del mouse
bindm = $mainMod, mouse:273, resizewindow


# ═══════════════════════════════════════════════════════════════════════════════
# MODALITÀ RIDIMENSIONAMENTO (RESIZE MODE)
# ═══════════════════════════════════════════════════════════════════════════════
# Premi SUPER + R per entrare in modalità resize.
# Usa frecce o HJKL per ridimensionare, ESC o ENTER per uscire.

bind = $mainMod, R, submap, resize

submap = resize

binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10

binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10

bind = , escape, submap, reset
bind = , return, submap, reset

submap = reset


# Menu di spegnimento/uscita
# Se hyprshutdown è installato, lo usa, altrimenti exit normale
bind = $mainMod, X, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Lock screen (se usi hyprlock)
# Per bloccare la sessione quando ti allontani
bind = $mainMod CTRL, L, exec, hyprlock

# Screenshot area selezionata (se usi grim + slurp)
bind = , F1, exec, grim -g "$(slurp)" - | swappy -f -

# ═══════════════════════════════════════════════════════════════════════════════
# SCORCIATOIE EXTRA CONSIGLIATE (decommenta se ti servono)
# ═══════════════════════════════════════════════════════════════════════════════

# Toggle barra di stato (waybar)
#bind = $mainMod SHIFT, W, exec, killall waybar; sleep 0.5 && waybar -c $HOME/.config/hypr/waybar/config -s $HOME/.config/hypr/waybar/style.css &
# bind = $mainMod CTRL, B, exec, waybar-toggle
bind = $mainMod SHIFT, W, exec, killall quickshell; sleep 0.5 && quickshell --path $HOME/.config/hypr/quickshell/shell.qml

# Toggle notifiche (dunst/mako)
# bind = $mainMod CTRL, N, exec, dunstctl set-paused toggle

# Cambia layout tastiera (se usi più layout)
# bind = $mainMod CTRL, K, exec, hyprctl switchxkblayout at-translated-set-2-keyboard next

# Workspace silenziosi (senza notifiche)
# bind = $mainMod CTRL, 1, workspace, 1
# bind = $mainMod CTRL, 2, workspace, 2

# Toggle animazioni (per quando vuoi massima performance)
# bind = $mainMod CTRL, A, exec, hyprctl keyword animations:enabled false
