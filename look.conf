# ═══════════════════════════════════════════════════════════════════════════════
# LOOK.CONF - Aspetto e stile tema Verde(Dark Minimal)
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
# IMPOSTAZIONI CURSORE (PER NVIDIA)
# ───────────────────────────────────────────────────────────────────────────────
cursor {
    # Disabilita il cursore hardware (necessario per NVIDIA per evitare schermo nero)
    # true = usa cursore software, false = hardware (default)
    # no_hardware_cursors = true
}

# ───────────────────────────────────────────────────────────────────────────────
# IMPOSTAZIONI GENERALI
# ───────────────────────────────────────────────────────────────────────────────
# Documentazione: https://wiki.hypr.land/Configuring/Variables/#general

general {
    # Spazio interno alle finestre (tra bordo e contenuto della finestra)
    # Valore più basso = più minimal, più spazio per il contenuto
    gaps_in = 3

    # Spazio esterno alle finestre (tra finestre vicine e bordi schermo)
    # Crea separazione visiva tra le finestre
    gaps_out = 8

    # Spessore del bordo delle finestre (in pixel)
    # Bordo sottile per look minimal hacker
    border_size = 2

    # ─── COLORI BORDI ────────────────────────────────────────────────────────
    # Formato: rgba(RRGGBBAA) o gradiente: rgba(...) rgba(...) <angolo>deg
    # Verde terminale: 00ff00, verde scuro: 003300

    # Bordo finestra ATTIVA (quella in focus)
    # Gradiente Matrix: verde brillante → verde acqua → verde scuro
    # Angolo 45 gradi per effetto dinamico "energia che scorre"
    col.active_border = rgba(00ff41cc) rgba(00cc33cc) rgba(006611cc) 45deg

    # Bordo finestra INATTIVA (quelle non in focus)
    # Verde molto scuro e semi-trasparente, quasi invisibile
    col.inactive_border = rgba(003300aa)

    # Permette di ridimensionare le finestre cliccando e trascinando i bordi
    # Utile per workflow veloce senza dover usare le scorciatoie
    resize_on_border = true

    # Abilita il tearing (può ridurre input lag ma causa screen tearing)
    # false = niente tearing, più fluido visivamente
    # true = possibile tearing, ma input più reattivo (utile per gaming)
    allow_tearing = false

    # Layout di default per le finestre
    # master = una finestra principale grande, le altre in colonna
    # dwindle = layout a spirale/tiling automatico
    layout = master
}


# ───────────────────────────────────────────────────────────────────────────────
# LAYOUT MASTER
# ───────────────────────────────────────────────────────────────────────────────
# Documentazione: https://wiki.hypr.land/Configuring/Master-Layout/
# Il layout "master" è perfetto per workflow minimal: una finestra principale
# grande + altre finestre più piccole in colonna laterale.

master {
    # Permette di creare finestre molto piccole (utile per split multipli)
    allow_small_split = true

    # Fattore di scala per la workspace speciale (scratchpad)
    # 0.95 = 95% della dimensione normale
    special_scale_factor = 0.95

    # Fattore di dimensione per la finestra "master" (principale)
    # 0.55 = la finestra principale occupa il 55% dello schermo
    # Aumenta per più spazio alla finestra principale, diminuisci per le altre
    mfact = 0.55

    # Dove posizionare le nuove finestre
    # slave = le nuove finestre vanno nella colonna "slave" (secondarie)
    # master = le nuove finestre diventano la finestra master (principale)
    new_status = slave

    # Se le nuove finestre vanno in cima alla pila
    # false = vanno in fondo (comportamento standard)
    new_on_top = false

    # Comportamento quando si sposta una finestra su un'altra
    # none = nessun comportamento speciale
    new_on_active = none

    # Orientamento della colonna slave
    # right = colonna a destra, left = sinistra, top = sopra, bottom = sotto
    orientation = left

    # Se ridimensionare le finestre in modo intelligente quando si cambia layout
    # true = mantiene le proporzioni, evita finestre troppo piccole
    smart_resizing = true

    # Se le finestre possono essere "droppate" in posizioni specifiche
    # Utile per il drag & drop delle finestre
    drop_at_cursor = true
}


# ───────────────────────────────────────────────────────────────────────────────
# LAYOUT DWINDLE
# ───────────────────────────────────────────────────────────────────────────────
# Documentazione: https://wiki.hypr.land/Configuring/Dwindle-Layout/
# Layout alternativo a spirale. Non usato di default ma utile da configurare.

dwindle {
    # Abilita la modalità "pseudo-tiling"
    # Le finestre mantengono il loro aspect ratio ma si adattano allo spazio
    # pseudotile = true

    # Mantiene lo split corrente quando si chiudono finestre
    # Evita che il layout si riorganizzi completamente
    preserve_split = true
}


# ───────────────────────────────────────────────────────────────────────────────
# DECORAZIONI
# ───────────────────────────────────────────────────────────────────────────────
# Documentazione: https://wiki.hypr.land/Configuring/Variables/#decoration

decoration {
    # Arrotondamento angoli finestre (in pixel)
    # 0 = angoli vivi (molto hacker/terminal style)
    # 5-10 = leggermente arrotondati (minimal ma moderno)
    rounding = 15

    # Potenza della curva di arrotondamento
    # 2 = curva quadratica standard
    rounding_power = 2

    # ─── TRASPARENZA ─────────────────────────────────────────────────────────
    # Opacità finestra IN FOCUS (1.0 = completamente opaca)
    # 0.95 = leggermente trasparente, effetto moderno
    active_opacity = 0.95
    #active_opacity = 1.5

    # Opacità finestra NON IN FOCUS
    # 0.85 = più trasparente per dare enfasi alla finestra attiva
    inactive_opacity = 0.80
    #inactive_opacity = 1.5

    # ─── OMBREGGIATURA ───────────────────────────────────────────────────────
    shadow {
        # Abilita ombre sotto le finestre
        # true = più profondità visiva, false = look più flat/minimal
        enabled = true

        # Raggio dell'ombra (quanto si espande)
        range = 20

        # Potenza di rendering (più alto = transizione più netta)
        render_power = 3

        # Colore dell'ombra (rgba)
        # Verde Matrix semi-trasparente per ombra neon
        color = rgba(00ff4144)
        color_inactive = rgba(00330022)
    }

    # ─── BLUR (SFOCATURA SFONDO) ────────────────────────────────────────────
    # Effetto blur sulle finestre trasparenti
    # Utile se hai wallpaper colorati e vuoi leggibilità
    blur {
        # Abilita effetto blur
        enabled = true

        # Dimensione del blur (più alto = più sfocato)
        size = 4

        # Numero di passaggi di blur (più passaggi = più bello ma più GPU)
        passes = 2

        new_optimizations = true
        ignore_opacity = false
        xray = true
        
        # Blur più intenso sulle finestre inattive per effetto "depth"
        contrast = 1.2
        brightness = 1.1
        noise = 0.02
        vibrancy = 0.3
    }
}

# ───────────────────────────────────────────────────────────────────────────────
# IMPOSTAZIONI MISCELLANEE
# ───────────────────────────────────────────────────────────────────────────────
# Documentazione: https://wiki.hypr.land/Configuring/Variables/#misc

misc {
    # Variable Frame Rate: riduce i refresh quando lo schermo è statico.
    # CRITICO per il risparmio batteria su laptop.
    # vfr = true

    # Risparmio energia monitor (DPMS)
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true

    # Terminal swallowing: nasconde il terminale quando apri un'app GUI da esso
    # Riduce il numero di finestre renderizzate contemporaneamente.
    enable_swallow = true
    swallow_regex = ^(kitty)$

    # Forza wallpaper di default (0 = disabilita, 1 = forza, -1 = auto)
    # -1 = nessun wallpaper forzato, usa il tuo
    force_default_wallpaper = -1

    # Disabilita logo Hyprland / anime girl sugli sfondi
    # true = niente logo, più pulito
    disable_hyprland_logo = true
}


# ───────────────────────────────────────────────────────────────────────────────
# INPUT (TASTIERA E MOUSE)
# ───────────────────────────────────────────────────────────────────────────────
# Documentazione: https://wiki.hypr.land/Configuring/Variables/#input

input {
    # Layout tastiera
    # us = inglese, it = italiano, de = tedesco, fr = francese, etc.
    kb_layout = us
    
    # Variante del layout (per caratteri speciali)
    # leave empty for default, or try 'nodeadkeys' per evitare dead keys
    kb_variant = 
    
    # Modello di tastiera (di solito non serve specificarlo)
    kb_model = 
    
    # Opzioni aggiuntive (es. caps:escape per swap CapsLock con Escape)
    # kb_options = caps:escape
    kb_options = 
    
    # Regole XKB (di solito non serve toccare)
    kb_rules = 

    # Il cursore segue il mouse tra le finestre
    # 0 = focus solo con click, 1 = focus col mouse, 2 = focus + raise window
    follow_mouse = 1

    # Sensibilità mouse (-1.0 a 1.0, 0 = default)
    # Utile se il mouse è troppo veloce/lento
    sensitivity = 0

    # ─── TOUCHPAD ────────────────────────────────────────────────────────────
    touchpad {
        # Scroll naturale (come su macOS/trackpad)
        # true = scrolla nella direzione del dito, false = scroll tradizionale
        natural_scroll = true

        # Abilita click con tap sul touchpad
        tap-to-click = true
    }
}

# ─── GESTURE (SCORCIATOIE CON DITA SUL TOUCHPAD) ───────────────────────────
# Swipe con 3 dita per cambiare workspace (orizzontale)
gesture = 3, horizontal, workspace

# ─── CONFIGURAZIONE PER DISPOSITIVO SPECIFICO ──────────────────────────────
# Puoi avere configurazioni diverse per mouse/tastiere diversi
# device {
#     name = epic-mouse-v1           # Nome del dispositivo (trovalo con hyprctl devices)
#     sensitivity = -0.5             # Sensibilità specifica per questo dispositivo
#     accel_profile = flat           # Profilo accelerazione (flat = 1:1, nessun加速)
# }


# ───────────────────────────────────────────────────────────────────────────────
# ANIMAZIONI MATRIX STYLE
# ───────────────────────────────────────────────────────────────────────────────
# Animazioni personalizzate ispirate al mondo Matrix:
# - Effetti "digital rain" nelle transizioni
# - Border glow che pulsa come codice in esecuzione
# - Fade con effetto "decodifica" per le finestre
# - Workspace switch con effetto scanline
#
# Documentazione: https://wiki.hypr.land/Configuring/Animations/

# ───────────────────────────────────────────────────────────────────────────────
# SYSTEM CORE: NEURAL-LINK ANIMATION SUBSYSTEM (V3.4.2)
# ───────────────────────────────────────────────────────────────────────────────
# [PROCESS: INITIALIZING GRAPHICAL KERNEL...]
# [HARDWARE: EMULATED ANALOG CRT SUBSYSTEM]
# [THEME: CYBER_PUNK_80S / TERMINAL HACKER]
# ───────────────────────────────────────────────────────────────────────────────
# Questo modulo gestisce il rendering cinetico dell'interfaccia. 
# Le curve di Bezier sono state calibrate per simulare l'inerzia dei fosfori 
# CRT, la risposta elettromagnetica dei vecchi tubi catodici e il flusso 
# di dati binari grezzi della Matrix originale.
# ───────────────────────────────────────────────────────────────────────────────

animations {
    # [STATUS: ACTIVE] - Inizializzazione accelerazione hardware
    enabled = yes

    # ─── BEZIER CURVES: THE LOGIC OF RETRO-COMPUTER MOVEMENT ───────────────
    # Definizione dei profili di velocità per il kernel grafico.
    # Ogni coordinata è stata calcolata per simulare l'inerzia di un terminale 
    # a fosfori verdi o la velocità di esecuzione di un mainframe anni '80.

    # 1. CRT_FLICKER: Simula il tremolio elastico dei monitor analogici.
    bezier = crtFlicker, 0.05, 0.9, 0.1, 1.05
    
    # 2. BINARY_DRIFT: Movimento lineare con esitazione da buffer sottodimensionato.
    bezier = binaryDrift, 0.22, 1, 0.36, 1
    
    # 3. MAINFRAME_BOOT: Accelerazione violenta tipica dei caricamenti da nastro.
    bezier = mainframeBoot, 0.16, 1, 0.3, 1
    
    # 4. GLITCH_JUMP: Scatto istantaneo con micro-rimbalzo finale (overshoot).
    bezier = glitchJump, 0.34, 1.56, 0.64, 1
    
    # 5. DATA_STREAM: Flusso costante e freddo, senza alcuna frizione digitale.
    bezier = dataStream, 0, 0, 1, 1
    
    # 6. NEURAL_LINK: Curva sinuosa per connessioni cerebrali profonde.
    bezier = neuralLink, 0.45, 0, 0.55, 1
    
    # 7. SECTOR_SCAN: Simula la testina di un floppy disk che cerca dati.
    bezier = sectorScan, 0.0, 0.5, 0.5, 1.0
    
    # 8. DECODING_TRACE: Lento in lettura, esplosivo in esecuzione.
    bezier = decodingTrace, 0.7, 0, 0.3, 1
    
    # 9. ANALOG_SNAP: Il feedback fisico di un interruttore meccanico del 1984.
    bezier = analogSnap, 0.1, 1.05, 0.2, 1.1
    
    # 10. MATRIX_RAIN: Caduta gravitazionale dei glifi verdi codificati.
    bezier = matrixRain, 0.76, 0, 0.24, 1
    
    # 11. PLASMA_FLOW: Movimento fluido come il gas nobile in un tubo neon.
    bezier = plasmaFlow, 0.25, 0.46, 0.45, 0.94
    
    # 12. OVERCLOCK: Curva estrema per movimenti iper-veloci.
    bezier = overclock, 0.0, 1.1, 0.1, 1.1

    # ─── WINDOW ENGINE: MATERIALIZATION & DECAY ─────────────────────────────
    # Regole per la manifestazione fisica delle finestre nello spazio virtuale.

    # [WINDOWS IN]: Le finestre si espandono come un fascio elettronico (80% popin).
    # Simulazione di "decodifica" visiva all'apertura.
    animation = windowsIn, 1, 5, mainframeBoot, popin 80%
    
    # [WINDOWS OUT]: Decadimento del segnale video verso il vuoto cosmico.
    # Effetto popin per simulare lo spegnimento rapido del tubo.
    animation = windowsOut, 1, 4, decodingTrace, popin 85%
    
    # [WINDOWS MOVE]: Spostamento solido con inerzia magnetica.
    # Usa glitchJump per quel feeling "cyber" di scatto improvviso.
    animation = windowsMove, 1, 3, glitchJump
    
    # ─── FADE EFFECTS: SIGNAL PROCESSING ─────────────────────────────────────
    # Gestione delle transizioni di opacità e luminanza.
    
    # Dissolvenza standard: stabilizzazione del segnale video.
    animation = fadeIn, 1, 4, dataStream
    
    # Dissolvenza in chiusura: perdita di sincronia verticale.
    animation = fadeOut, 1, 4, dataStream
    
    # Switch tra finestre: scia persistente di fosfori verdi.
    animation = fadeSwitch, 1, 6, neuralLink
    
    # Finestre inattive: risparmio energetico e "dark mode" hardware.
    animation = fadeShadow, 1, 5, binaryDrift
    
    # Bordi e decorazioni: fluttuazioni di tensione locali.
    animation = fadeDim, 1, 4, sectorScan

    # ─── VIRTUAL WORKSPACES: DATA SECTORS ────────────────────────────────────
    # Navigazione tra i settori di memoria della workstation hacker.

    # Workspace standard: scorrimento orizzontale (slide) fluido.
    # Simula il cambio di banchi di memoria.
    animation = workspaces, 1, 6, matrixRain, slide
    
    # Workspace speciale (Scratchpad): discesa tattica "dall'alto".
    # Feedback meccanico immediato all'apparizione.
    animation = specialWorkspace, 1, 5, analogSnap, slidevert
    
    # Transizioni interne dei workspace (per layout dinamici).
    animation = workspacesIn, 1, 5, plasmaFlow, slide
    animation = workspacesOut, 1, 5, plasmaFlow, slide

    # ─── KINETIC BORDERS: ENERGY PERIMETER ──────────────────────────────────
    # Il bordo non è statico; è un loop infinito di energia hacker.

    # Rotazione del gradiente: Scansione radar a 360 gradi costante.
    # Un valore di 40 garantisce una rotazione ipnotica e tech.
    # Perfetto per il bordo verde neon del tema Matrix.
    animation = borderangle, 1, 40, dataStream
    
    # Pulsazione dei bordi: "Respiro" della CPU sotto carico pesante.
    # Crea un effetto organico in un ambiente puramente digitale.
    animation = border, 1, 10, crtFlicker

    # ─── UI LAYERS: SUBSYSTEM INTERFACES ─────────────────────────────────────
    # Animazioni per barre di sistema, menu e overlay (Rofi, Waybar, Dunst).

    # Layers standard: Apparizione decisa ma non brusca.
    # Evita l'effetto "molle" per mantenere un tono serio e professionale.
    animation = layers, 1, 4, binaryDrift, fade
    
    # Entrata layer di sistema: Focus immediato sul comando.
    animation = fadeLayersIn, 1, 3, mainframeBoot
    
    # Uscita layer di sistema: Ritorno immediato al kernel.
    animation = fadeLayersOut, 1, 3, decodingTrace

    # ─── DIAGNOSTIC DATA & NOTES ─────────────────────────────────────────────
    # [MODULE: RENDERER_V4]
    # [OPTIMIZATION: PRE-FETCH_BUFFERS_ENABLED]
    # [LATENCY: <1MS_RENDER_TIME]
    #
    # Note per l'utente:
    # 1. Velocità tarate per monitor 60Hz/144Hz.
    # 2. Per un effetto più "lento e drammatico", aumentare il terzo valore 
    #    di ogni riga animation (es. da 5 a 10).
    # 3. La curva 'overclock' può essere usata per un'esperienza ultra-minimal.
    #
    # [SYSTEM_MESSAGE: ANIMATION_SUBSYSTEM_SYNCHRONIZED]
    # ──────────────────────────────────────────────────────────────────────────
}
