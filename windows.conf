# ═══════════════════════════════════════════════════════════════════════════════
# WINDOWS.CONF - Regole per finestre e workspace
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
# REGOLE GENERALI
# ───────────────────────────────────────────────────────────────────────────────

# windowrule {
#     # Rendi tutte le finestre semi-trasparenti
#     name = global-transparency
#     match:class = .*
#     opacity = 0.95 0.98
# }

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    no_focus = true
}

# CONKY
windowrule {
     name = conky-desktop
     match:class = ^Conky$
     float = yes
     pin = yes
     no_focus = yes
opacity = 1.0 1.0
}

# ───────────────────────────────────────────────────────────────────────────────
# REGOLE PER APPLET DI SISTEMA (FLOATING & CENTERED)
# ───────────────────────────────────────────────────────────────────────────────

windowrule {
    name = system-applets
    match:class = pavucontrol|blueman-manager|nm-connection-editor
    float = yes
    center = yes
    size = 600 400
    opacity = 0.9 0.8
}